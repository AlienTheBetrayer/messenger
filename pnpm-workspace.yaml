packages:
  - "apps/*"
  - "packages/*"
allowBuilds:
  "@nestjs/core": true
  "@prisma/engines": true
  "@scarf/scarf": false
  "@swc/core": set this to true or false
  msw: true
  prisma: true
  prisma-zod-generator: false
  sharp: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - "@hookform/resolvers@5.4.0"
